<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat</title>
<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@300;400;500&family=Geist:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0d0d;
    --surface: #141414;
    --border: #222;
    --text: #e8e8e8;
    --muted: #555;
    --accent: #e8e8e8;
    --user-bg: #1a1a1a;
    --model-bg: transparent;
    --radius: 12px;
    --font: 'Geist', sans-serif;
    --mono: 'Geist Mono', monospace;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    font-size: 14px;
    line-height: 1.6;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Header */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 24px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .status-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #3d3d3d;
    transition: background 0.3s;
  }
  .status-dot.connected { background: #4ade80; box-shadow: 0 0 6px #4ade8055; }
  .status-dot.error { background: #f87171; }

  .model-name {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.02em;
  }

  .header-actions {
    display: flex;
    gap: 8px;
  }

  .icon-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 6px 10px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 12px;
    font-family: var(--font);
    transition: all 0.15s;
  }
  .icon-btn:hover { color: var(--text); border-color: #333; background: #1a1a1a; }

  /* Config panel */
  .config-panel {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: none;
    gap: 12px;
    flex-wrap: wrap;
    align-items: flex-end;
  }
  .config-panel.open { display: flex; }

  .config-group {
    display: flex;
    flex-direction: column;
    gap: 5px;
    min-width: 160px;
  }

  .config-group label {
    font-size: 11px;
    color: var(--muted);
    font-family: var(--mono);
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  .config-group input, .config-group select {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 7px 10px;
    border-radius: 8px;
    font-size: 13px;
    font-family: var(--mono);
    outline: none;
    transition: border-color 0.15s;
  }
  .config-group input:focus, .config-group select:focus { border-color: #444; }
  .config-group select option { background: #1a1a1a; }

  /* Messages */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    scroll-behavior: smooth;
  }

  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: #222; border-radius: 2px; }

  /* Empty state */
  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    color: var(--muted);
    text-align: center;
    padding: 40px;
  }
  .empty-state svg { opacity: 0.3; }
  .empty-state h2 { font-size: 16px; font-weight: 400; color: #444; }
  .empty-state p { font-size: 13px; color: #333; max-width: 260px; line-height: 1.7; }

  /* Message rows */
  .message {
    display: flex;
    gap: 12px;
    max-width: 720px;
    width: 100%;
    margin: 0 auto;
    animation: fadein 0.2s ease;
  }

  @keyframes fadein {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .message.user { flex-direction: row-reverse; }

  .avatar {
    width: 28px;
    height: 28px;
    border-radius: 8px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-family: var(--mono);
    margin-top: 2px;
  }

  .message.user .avatar {
    background: #1e1e1e;
    border: 1px solid #2a2a2a;
    color: var(--muted);
  }

  .message.assistant .avatar {
    background: #1a1a1a;
    border: 1px solid var(--border);
    color: #444;
  }

  .bubble {
    padding: 10px 14px;
    border-radius: var(--radius);
    line-height: 1.65;
    font-size: 14px;
    max-width: calc(100% - 44px);
  }

  .message.user .bubble {
    background: var(--user-bg);
    border: 1px solid #222;
    color: var(--text);
    border-bottom-right-radius: 4px;
  }

  .message.assistant .bubble {
    color: #ccc;
    border-bottom-left-radius: 4px;
  }

  /* Code blocks */
  .bubble pre {
    background: #0a0a0a;
    border: 1px solid #1e1e1e;
    border-radius: 8px;
    padding: 12px 14px;
    overflow-x: auto;
    margin: 8px 0;
    font-family: var(--mono);
    font-size: 12.5px;
    line-height: 1.6;
  }

  .bubble code {
    font-family: var(--mono);
    font-size: 12.5px;
    background: #111;
    padding: 1px 5px;
    border-radius: 4px;
    color: #aaa;
  }

  .bubble pre code {
    background: none;
    padding: 0;
  }

  /* Typing indicator */
  .typing {
    display: flex;
    gap: 4px;
    align-items: center;
    padding: 14px;
  }
  .typing span {
    width: 5px;
    height: 5px;
    background: #333;
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
    40% { transform: translateY(-5px); opacity: 1; }
  }

  /* Input area */
  .input-area {
    padding: 16px 24px 20px;
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }

  .input-wrapper {
    max-width: 720px;
    margin: 0 auto;
    display: flex;
    gap: 8px;
    align-items: flex-end;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 8px 8px 8px 14px;
    transition: border-color 0.15s;
  }
  .input-wrapper:focus-within { border-color: #2e2e2e; }

  textarea {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-family: var(--font);
    font-size: 14px;
    line-height: 1.6;
    resize: none;
    min-height: 24px;
    max-height: 160px;
    overflow-y: auto;
  }
  textarea::placeholder { color: #333; }
  textarea::-webkit-scrollbar { display: none; }

  .send-btn {
    background: #1e1e1e;
    border: 1px solid #2a2a2a;
    color: var(--muted);
    width: 34px;
    height: 34px;
    border-radius: 8px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.15s;
  }
  .send-btn:hover:not(:disabled) { background: #252525; color: var(--text); border-color: #333; }
  .send-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .send-btn.active { color: var(--text); background: #222; }

  .hint {
    text-align: center;
    font-size: 11px;
    color: #2a2a2a;
    margin-top: 10px;
    font-family: var(--mono);
  }

  /* Error toast */
  .toast {
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%) translateY(10px);
    background: #1a0a0a;
    border: 1px solid #3d1515;
    color: #f87171;
    padding: 8px 16px;
    border-radius: 8px;
    font-size: 13px;
    font-family: var(--mono);
    opacity: 0;
    transition: all 0.2s;
    pointer-events: none;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="status-dot" id="statusDot"></div>
    <span class="model-name" id="modelLabel">not connected</span>
  </div>
  <div class="header-actions">
    <button class="icon-btn" onclick="toggleConfig()">config</button>
    <button class="icon-btn" onclick="clearChat()">clear</button>
  </div>
</header>

<div class="config-panel" id="configPanel">
  <div class="config-group">
    <label>Base URL</label>
    <input type="text" id="baseUrl" value="" placeholder="same origin (leave blank)" />
  </div>
  <div class="config-group">
    <label>Model</label>
    <input type="text" id="modelId" value="" placeholder="auto-detect" />
  </div>
  <div class="config-group">
    <label>Temperature</label>
    <input type="number" id="temperature" value="0.7" min="0" max="2" step="0.1" style="width:80px" />
  </div>
  <div class="config-group">
    <label>Max Tokens</label>
    <input type="number" id="maxTokens" value="1024" min="64" max="8192" step="64" style="width:90px" />
  </div>
  <div class="config-group">
    <label>System Prompt</label>
    <input type="text" id="systemPrompt" value="You are a helpful assistant." style="width:240px" />
  </div>
  <div class="config-group" style="justify-content:flex-end">
    <button class="icon-btn" onclick="connect()" style="height:32px">connect</button>
  </div>
</div>

<div class="messages" id="messages">
  <div class="empty-state" id="emptyState">
    <svg width="36" height="36" fill="none" viewBox="0 0 24 24">
      <path stroke="#555" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"
        d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/>
    </svg>
    <h2>Start a conversation</h2>
    <p>Configure your vLLM endpoint above and hit connect to begin.</p>
  </div>
</div>

<div class="input-area">
  <div class="input-wrapper">
    <textarea id="input" rows="1" placeholder="Send a message…" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()" disabled>
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none">
        <path d="M5 12h14M13 6l6 6-6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </div>
  <div class="hint">enter to send &nbsp;·&nbsp; shift+enter for newline</div>
</div>

<div class="toast" id="toast"></div>

<script>
  let history = [];
  let isStreaming = false;
  let connectedModel = null;

  // Auto-resize textarea
  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 160) + 'px';
  }

  function toggleConfig() {
    document.getElementById('configPanel').classList.toggle('open');
  }

  function showToast(msg, duration = 3000) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), duration);
  }

  function setStatus(state, label) {
    const dot = document.getElementById('statusDot');
    const lbl = document.getElementById('modelLabel');
    dot.className = 'status-dot ' + state;
    lbl.textContent = label;
  }

  async function connect() {
    const base = (document.getElementById('baseUrl').value.trim() || window.location.origin).replace(/\/$/, '');
    setStatus('', 'connecting…');
    try {
      const res = await fetch(`${base}/v1/models`);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      const models = data.data || [];
      if (models.length === 0) throw new Error('No models found');

      // Use first model if not manually set
      const manualModel = document.getElementById('modelId').value.trim();
      connectedModel = manualModel || models[0].id;
      document.getElementById('modelId').value = connectedModel;

      setStatus('connected', connectedModel);
      document.getElementById('sendBtn').disabled = false;
      document.getElementById('input').focus();
      document.getElementById('configPanel').classList.remove('open');
    } catch (e) {
      setStatus('error', 'connection failed');
      showToast('Cannot reach ' + base);
    }
  }

  function clearChat() {
    history = [];
    const msgs = document.getElementById('messages');
    msgs.innerHTML = `
      <div class="empty-state" id="emptyState">
        <svg width="36" height="36" fill="none" viewBox="0 0 24 24">
          <path stroke="#555" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"
            d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/>
        </svg>
        <h2>Start a conversation</h2>
        <p>Configure your vLLM endpoint above and hit connect to begin.</p>
      </div>`;
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      if (!isStreaming) sendMessage();
    }
  }

  function removeEmptyState() {
    const es = document.getElementById('emptyState');
    if (es) es.remove();
  }

  function appendMessage(role, content = '') {
    removeEmptyState();
    const msgs = document.getElementById('messages');

    const row = document.createElement('div');
    row.className = `message ${role}`;

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = role === 'user' ? 'you' : 'ai';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    if (content) bubble.innerHTML = renderMarkdown(content);
    else bubble.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';

    row.appendChild(avatar);
    row.appendChild(bubble);
    msgs.appendChild(row);
    msgs.scrollTop = msgs.scrollHeight;
    return bubble;
  }

  // Minimal markdown: code blocks, inline code, bold, italic
  function renderMarkdown(text) {
    return text
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) =>
        `<pre><code class="lang-${lang}">${code.trim()}</code></pre>`)
      .replace(/`([^`]+)`/g, '<code>$1</code>')
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.+?)\*/g, '<em>$1</em>')
      .replace(/\n/g, '<br>');
  }

  async function sendMessage() {
    const input = document.getElementById('input');
    const text = input.value.trim();
    if (!text || isStreaming) return;
    if (!connectedModel) { toggleConfig(); showToast('Connect to a model first'); return; }

    input.value = '';
    input.style.height = 'auto';
    isStreaming = true;
    document.getElementById('sendBtn').disabled = true;

    // Add user message
    history.push({ role: 'user', content: text });
    appendMessage('user', text);

    // Assistant bubble with typing indicator
    const bubble = appendMessage('assistant');

    const base = document.getElementById('baseUrl').value.trim().replace(/\/$/, '');
    const systemPrompt = document.getElementById('systemPrompt').value.trim();
    const messages = systemPrompt
      ? [{ role: 'system', content: systemPrompt }, ...history]
      : [...history];

    let fullText = '';

    try {
      const res = await fetch(`${base}/v1/chat/completions`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: connectedModel,
          messages,
          temperature: parseFloat(document.getElementById('temperature').value),
          max_tokens: parseInt(document.getElementById('maxTokens').value),
          stream: true
        })
      });

      if (!res.ok) throw new Error(`HTTP ${res.status}`);

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      bubble.innerHTML = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        const chunk = decoder.decode(value);
        const lines = chunk.split('\n').filter(l => l.startsWith('data: '));

        for (const line of lines) {
          const json = line.slice(6).trim();
          if (json === '[DONE]') break;
          try {
            const parsed = JSON.parse(json);
            const delta = parsed.choices?.[0]?.delta?.content || '';
            fullText += delta;
            bubble.innerHTML = renderMarkdown(fullText);
            document.getElementById('messages').scrollTop = 99999;
          } catch {}
        }
      }

      history.push({ role: 'assistant', content: fullText });

    } catch (e) {
      bubble.innerHTML = '<span style="color:#f87171;font-family:var(--mono);font-size:12px">error: ' + e.message + '</span>';
      history.pop(); // Remove failed user message
    }

    isStreaming = false;
    document.getElementById('sendBtn').disabled = false;
    input.focus();
  }

  // Try auto-connect on load
  window.addEventListener('load', () => {
    const input = document.getElementById('input');
    input.addEventListener('input', () => {
      document.getElementById('sendBtn').classList.toggle('active', input.value.trim().length > 0);
    });
    connect();
  });
</script>
</body>
</html>
