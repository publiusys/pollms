  .sidebar {
    width: 400px; flex-shrink: 0; background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column; padding: 20px;
  }
  .sidebar h1 { font-size: 25px; font-weight: 600; margin-bottom: 24px; }
  .sidebar h4 { font-size: 24px; font-weight: 700; text-align: center}
  .panel { background: var(--surface2); border: 1px solid var(--border);
           border-radius: 10px; padding: 14px; margin-bottom: 14px; }
  .panel h4 { font-size: 11px; text-transform: uppercase; letter-spacing: .08em;
              color: var(--text3); font-family: var(--font); margin-bottom: 10px; }
  .eco-row { display: flex; justify-content: center; align-items: center;
             padding: 5px 0; font-size: 20px; text-align: center; font-family: var(--mono)}
  .eco-key { color: var(--text2); font-family: var(--mono); font-size: 15px; text-align: center }
  .eco-val { color: var(--text); font-family: var(--mono); font-size: 15px; transition: color .25s, opacity .25s; text-align: center}
  .eco-row.dim  { opacity: .35; transition: opacity .25s; }
  .eco-row.live { opacity: 1;   transition: opacity .25s; }
  .eco-val.pulse  { color: var(--green);  font-weight: 600; }
  .eco-val.idlehi { color: var(--green); font-weight: 600; }
  .eco-val.highlight { color: var(--green); font-weight: 600; }

  /* ---------- Main ---------- */
  .main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  .header {
    height: 56px; flex-shrink: 0; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; padding: 0 24px; gap: 10px;
  }
  .status-dot { width: 9px; height: 9px; border-radius: 50%; background: var(--text3); }
  .status-dot.connected { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .status-dot.error { background: var(--red); }
  .status-dot.connecting { background: var(--yellow); }
  /*#modelLabel { font-size: 13px; color: var(--text2); font-family: var(--mono); }*/
  #modelLabel { font-size: 16px; color: var(--text2); font-family: var(--mono); }

  .messages { flex: 1; overflow-y: auto; padding: 24px; }
  /*.empty-state { height: 100%; display: flex; flex-direction: column;
                 align-items: center; justify-content: center; color: var(--text3);
                 font-family: var(--mono); font-size: 13px; gap: 6px; }*/
  .empty-state { height: 100%; display: flex; flex-direction: column;
               align-items: center; justify-content: center; color: var(--text3);
               font-family: var(--mono); font-size: 18px; gap: 6px; }

  .row { display: flex; gap: 12px; margin-bottom: 22px; max-width: 820px; }
  .avatar { width: 28px; height: 28px; border-radius: 7px; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
            font-family: var(--mono); font-size: 11px; font-weight: 600; }
  .row.user .avatar { background: var(--surface2); color: var(--text2); }
  .row.assistant .avatar { background: #14321f; color: var(--green); }
  .col { min-width: 0; flex: 1; }
  .bubble { background: var(--surface); border: 1px solid var(--border);
            border-radius: 10px; padding: 12px 14px; font-size: 14px;
            line-height: 1.6; color: var(--text); white-space: normal; word-wrap: break-word; }
  .row.user .bubble { background: var(--surface2); }
  .bubble pre { background: #0c0e12; border: 1px solid var(--border); border-radius: 8px;
                padding: 10px; overflow-x: auto; margin: 8px 0; }
  .bubble code { font-family: var(--mono); font-size: 12.5px; }
  .msg-meta { display: flex; align-items: center; gap: 6px; margin-top: 6px;
              font-family: var(--mono); font-size: 11px; color: var(--text3); }
  .meta-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--border); }
  .button {
    border: #0c0e12;
    border-radius: 25px;
    background-color: #313642;
    color: white;
    flex-shrink: 0; 
    width: 60px; 
    height: 40px; 
    border-radius: 9px; 
    cursor: pointer;
    display: flex; 
    align-items: center; 
    justify-content: center; 
    }
    
  /* ---------- Composer ---------- */
  .composer { flex-shrink: 0; border-top: 1px solid var(--border); padding: 16px 24px 18px; }
  .composer-inner { max-width: 820px; margin: 0 auto; }
  .input-wrap { display: flex; gap: 10px; align-items: flex-end;
                background: var(--surface); border: 1px solid var(--border);
                border-radius: 12px; padding: 8px 8px 8px 14px; }
  textarea#input { flex: 1; background: transparent; border: none; outline: none;
                   color: var(--text); font-family: var(--font); font-size: 14px;
                   resize: none; line-height: 1.5; max-height: 140px; }
  #sendBtn { flex-shrink: 0; width: 36px; height: 36px; border-radius: 9px; border: none;

             display: flex; align-items: center; justify-content: center; transition: background .2s; }

  /*#sendBtn:disabled { background: var(--surface2); color: var(--text3); cursor: not-allowed; }*/

                margin-top: 8px; font-family: var(--font); }

  .toast { position: fixed; bottom: 80px; left: 50%;
           transform: translateX(-50%) translateY(10px);
           background: var(--red-bg); border: 1px solid #7a2020; color: #fca5a5;
           padding: 8px 16px; border-radius: 8px; font-size: 13px; font-family: var(--mono);
           opacity: 0; pointer-events: none; transition: opacity .2s, transform .2s; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .light {
      width: 16px; height: 16px; border-radius: 50%;
      border: 1px solid var(--border);
      transition: background .25s, opacity .25s, box-shadow .25s;
      opacity: .4;
  }
  .light[data-level="1"] { background: #ef4444; }
  .light[data-level="2"] { background: #f97316; }
  .light[data-level="3"] { background: #eab308; }
  .light[data-level="4"] { background: #84cc16; }
  .light[data-level="5"] { background: #22c55e; }
  
  .light[data-level="1"].on { opacity: 1; box-shadow: 0 0 7px #ef4444; }
  .light[data-level="2"].on { opacity: 1; box-shadow: 0 0 7px #f97316; }
  .light[data-level="3"].on { opacity: 1; box-shadow: 0 0 7px #eab308; }
  .light[data-level="4"].on { opacity: 1; box-shadow: 0 0 7px #84cc16; }
  .light[data-level="5"].on { opacity: 1; box-shadow: 0 0 7px #22c55e; }

  /* lit, steady (no pulse) */
  .light.on {
  opacity: 1;
  }
  
  @keyframes light-pulse {
  0%, 100% { opacity: 1; filter: brightness(1); }
  50%      { opacity: .35; filter: brightness(.6); }
  }

<script>
  // ---------------- State ----------------
  const DEBUG = true;   // set false to silence console logging
  let history = [], isStreaming = false, connectedModel = null, abortController = null;
  let promptWords = 0, responseWords = 0;
  let sessionTokens = 0;
  let powerState = { current_w: 0, idle_w: null, active: false };
  let energyWh = 0;        // running session energy in watt-hours
  let lastPowerTs = null;  // timestamp of previous sample

  // CIuse from ACT (Gupta et al., ISCA 2022, https://dl.acm.org/doi/10.1145/3470496.3527408), Table 6
  const CARBON_INTENSITY_G_PER_KWH = 380;     // US avg
  // USDA / Arbor Day (https://www.usda.gov/about-usda/news/blog/power-one-tree-very-air-we-breathe): mature tree absorbs >48 lb CO2/yr = 21,772 g/yr
  //const TREE_G_CO2_PER_YEAR = 21772;          // kept for future use (see updateTrees)
  // Water-use equivalent. Brightest (https://www.brightest.io/calculate-carbon-footprint-water-emissions):
  // regular water supply/treatment emits ~0.340–0.46 kg CO2 per cubic meter; use the midpoint.
  //const WATER_G_CO2_PER_M3 = 400;             // g CO2 per m^3 of water (midpoint of 340–460)
  
  // ---------------- Water config ----------------
  // Operational-water model from Li et al. 2023 (arXiv:2304.03271):
  //   scope 1 (on-site cooling)      = E_IT * WUE_onsite
  //   scope 2 (electricity generation) = E_IT * PUE * EWIF
  // PUE multiplies ONLY scope 2, because the grid powers the whole facility, not just IT.
  
  const FL_OZ_PER_LITER = 33.814;             // 1 L = 33.814 US fl oz (1 fl oz = 29.5735 mL)
  const GLASS_ML = 236.588;                   // a regular glass = 8 US fl oz (no longer used; output is fl oz)
  
  // --- Scope 1: on-site WUE (L / kWh of IT energy) ---
  // https://airsysnorthamerica.com/puw-vs-wue-balancing-efficiency-sustainability-in-data-centers/
  const WUE_INDUSTRY_AVERAGE = 1.8;           // 
  // https://blogs.microsoft.com/blog/2026/06/24/inside-microsofts-two-decade-push-to-cut-water-intensity-while-scaling-for-growth/
  const WUE_MICROSOFT_HYPERSCALER = 0.27;     // ACTIVE  
  
  // --- Scope 2: off-site electricity water intensity, EWIF (L / kWh of electricity) ---
  // The scope-2 grid figure is the contested term, so keep a low / medium / high band
  // and pick one for the displayed number. Switch SCOPE2_SCENARIO to report the band.
  const EWIF_SCOPE2 = {
      // Hydro-excluded US electric-power water consumption (reservoir evaporation removed).
      // construction-physics.com/p/i-was-wrong-about-data-center-water  — low-end estimate
      low:    2.1,
      // WRI / Macknick US-average water-consumption intensity; also used by Li et al. 2023
      // (arXiv:2304.03271). Sits ~midway between the low and high estimates.
      medium: 3.14,
      // US avg electric-power water consumption, LBNL 2024 US Data Center Energy Report
      // (Shehabi et al., LBNL-2001637).  High-end estimate.
      high:   4.35,
  };

  // --- PUE: facility overhead = grid electricity drawn / IT energy. Modern hyperscale ≈ 1.12–1.18. ---
  // Set to 1.0 if you want scope 2 charged against IT energy only (ignoring facility overhead).
  const PUE = 1.15;
  
  // Active scenario for the displayed number. Set to "low" / "medium" / "high".
  const SCOPE2_SCENARIO = "medium";
  const EWIF_SCOPE2_L_PER_KWH = EWIF_SCOPE2[SCOPE2_SCENARIO];
  
  
  const SEND_ICON = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M5 12h14M13 6l6 6-6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
  const STOP_ICON = `<svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>`;

  // ---------------- Efficiency config ----------------
  // Set this per model/hardware page: 1 (least efficient) … 5 (most efficient)
  const EFFICIENCY_SCORE = 2;
    
  // TODO: not supported by backend yet. Set 1-5 once a tokens/sec -> score mapping exists.
  const SPEED_SCORE = null;
  
  // Brand tag shown next to "MochiAI", keyed to EFFICIENCY_SCORE (1..5)
  const MOCHI_TAGS = { 5: "Pen 🖊️", 4: "Mix 🥣 ", 3: "Dip 🥨", 2: "Jam 🎸", 1: "Knit 🧶" };
  (function () {
    const el = document.getElementById("mochi-tag");
    const tag = MOCHI_TAGS[EFFICIENCY_SCORE];
      if (el && tag) el.textContent = ":    " + tag;
    document.title = tag;
  })();
  
  // ---------------- Power telemetry ----------------
  function accumulateEnergy() {
    const now = performance.now();
    if (lastPowerTs != null) { //  && isStreaming -> turned off to always update co2 and oz water
      const dtHours = (now - lastPowerTs) / 3.6e6;   // ms -> hours
      let watts = powerState.current_w;
      energyWh += watts * dtHours;
      updateMetrics();
      //updateTrees();
    }
    lastPowerTs = now;
  }

  function updateMetrics() {
      const kWh = energyWh / 1000;                       // IT (server) energy, kWh

      // ---- Carbon ----
      const co2g = kWh * CARBON_INTENSITY_G_PER_KWH;     // grams CO2
      document.getElementById("tt-carbon").textContent = co2g.toFixed(6) + " g CO\u2082";
      
      // ---- Operational water consumed (scope 1 + scope 2) ----
      const scope1Liters = kWh * WUE_INDUSTRY_AVERAGE;        // on-site cooling
      const scope2Liters = kWh * PUE * EWIF_SCOPE2_L_PER_KWH;      // electricity generation
      const totalLiters  = scope1Liters + scope2Liters;
      
      const scope1FlOz = scope1Liters * FL_OZ_PER_LITER;
      const scope2FlOz = scope2Liters * FL_OZ_PER_LITER;
      const totalFlOz  = totalLiters  * FL_OZ_PER_LITER;
      const glasses = (totalLiters * 1000) / GLASS_ML;   // 1 glass = 8 fl oz
  
      //document.getElementById("tt-water").textContent = totalFlOz.toFixed(6) + " fl oz (" + glasses.toFixed(6) + " glasses of water)";
     //document.getElementById("tt-water").textContent = totalFlOz.toFixed(6) + " fl oz";
     document.getElementById("tt-water").textContent = glasses.toFixed(6);
  
      // To show the scope split instead, swap the line above for:
      // document.getElementById("tt-water").textContent =
      //   `${totalFlOz.toFixed(6)} fl oz  (S1 ${scope1FlOz.toFixed(6)} / S2 ${scope2FlOz.toFixed(6)})`;
  }

      document.getElementById("tt-carbon").textContent = co2g.toFixed(6) + " g CO\u2082";

      // ---- Actual Cooling Water Consumed ----
      // 1. Find total liters consumed
      const waterLiters = kWh * WUE_INDUSTRY_AVERAGE;
      // 2. Convert Liters to mL (x1000) and then divide by glass size
      const glasses = (waterLiters * 1000) / GLASS_ML;
      document.getElementById("tt-water").textContent = glasses.toFixed(6) + " glasses";
  }*/

    /*function updateTrees() {
    const kWh     = energyWh / 1000;
    const co2g    = kWh * CARBON_INTENSITY_G_PER_KWH;   // grams CO2

    document.getElementById("tt-carbon").textContent = co2g.toFixed(5) + " g CO\u2082";

    // ---- Glasses of water equivalent ----
    // co2g (g) / WATER_G_CO2_PER_M3 (g/m^3) = m^3 of water with the same footprint.
    // m^3 -> mL (x1e6) -> glasses (/ GLASS_ML).
    const glasses = (co2g / WATER_G_CO2_PER_M3) * 1e6 / GLASS_ML;
    document.getElementById("tt-water").textContent = glasses.toFixed(6) + " glasses";

    // ---- Trees-to-offset metric: kept for future use ----
    // const trees = co2g / TREE_G_CO2_PER_YEAR;         // tree-years to offset
    // document.getElementById("tt-trees").textContent = trees.toFixed(10) + " trees";
    // grams is the legible number; trees is tiny per session
    //document.getElementById("tt-trees").textContent =
    //  co2g.toFixed(3) + " g CO\u2082  (" + (treeYrs * 365).toFixed(2) + " tree-days)";
    }*/

  async function pollPower() {
    try {
      const r = await fetch("/power");
      powerState = await r.json();
    } catch {}
    accumulateEnergy();
    renderPower();
  }
  setInterval(pollPower, 1000);

  function renderPower() {
    const idleEl = document.getElementById("tt-idle");
    const actEl  = document.getElementById("tt-active");
    const rowIdle = document.getElementById("row-idle");
    const rowAct  = document.getElementById("row-active");

    idleEl.textContent = powerState.idle_w != null ? powerState.idle_w.toFixed(2) + " W" : "—";
    actEl.textContent  = isStreaming ? powerState.current_w.toFixed(2) + " W" : "—";

    if (isStreaming) {
      rowAct.classList.add("live");  rowAct.classList.remove("dim");
      rowIdle.classList.add("dim");  rowIdle.classList.remove("live");
      actEl.classList.add("pulse");  idleEl.classList.remove("idlehi");
    } else {
      rowIdle.classList.add("live"); rowIdle.classList.remove("dim");
      rowAct.classList.add("dim");   rowAct.classList.remove("live");
      idleEl.classList.add("idlehi"); actEl.classList.remove("pulse");
    }
      
    renderEfficiency();
  }

  async function setActive(flag) {
    try {
      await fetch("/active", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ active: flag })
      });
    } catch {}
  }

  // ---------------- Token accumulator ----------------
  function updateTokens() {
    document.getElementById("tt-tokens").textContent = sessionTokens.toLocaleString();
  }
  function countWords(s) { return (s.trim().match(/\S+/g) || []).length; }
  function updateWordCounts(liveResponseText = "") {
    document.getElementById("tt-prompt-words").textContent = promptWords.toLocaleString();
    const live = countWords(liveResponseText);
    document.getElementById("tt-response-words").textContent = (responseWords + live).toLocaleString();
  }

  // ---------------- UI helpers ----------------
  function showToast(msg, d = 3000) {
    const t = document.getElementById("toast");
    t.textContent = msg; t.classList.add("show");
    setTimeout(() => t.classList.remove("show"), d);
  }
  function setStatus(state, label) {
    document.getElementById("statusDot").className = "status-dot " + state;
    document.getElementById("modelLabel").textContent = label;
  }
  function autoResize(el) {
    el.style.height = "auto";
    el.style.height = Math.min(el.scrollHeight, 140) + "px";
  }
  function setStreamingUI(streaming) {
    const btn = document.getElementById("sendBtn");
    if (streaming) {
      btn.classList.add("streaming"); btn.innerHTML = STOP_ICON; btn.disabled = false;
    } else {
      btn.classList.remove("streaming"); btn.innerHTML = SEND_ICON;
    }
  }
  function removeEmptyState() {
    const e = document.getElementById("emptyState");
    if (e) e.remove();
  }
  function handleKey(e) {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      if (!isStreaming) sendMessage();
    }
  }
  function onSendClick() {
    if (isStreaming) stopStreaming();
    else sendMessage();
  }
  function stopStreaming() {
    if (abortController) abortController.abort();
  }

  function appendMessage(role, text) {
    removeEmptyState();
    const msgs = document.getElementById("messages");
    const row = document.createElement("div");
    row.className = "row " + role;
    const avatar = document.createElement("div");
    avatar.className = "avatar";
    avatar.textContent = role === "user" ? "you" : "ai";
    const col = document.createElement("div");
    col.className = "col";
    const bubble = document.createElement("div");
    bubble.className = "bubble";
    if (role === "assistant") {
      bubble.innerHTML = `<span style="color:var(--text3);font-family:var(--mono);font-size:12px">…</span>`;
      const meta = document.createElement("div");
      meta.className = "msg-meta";
      const dot = document.createElement("div"); dot.className = "meta-dot";
      const txt = document.createElement("span");
      meta.append(dot, txt);
      col.appendChild(bubble); col.appendChild(meta);
      bubble._dot = dot; bubble._txt = txt;
    } else {
      bubble.textContent = text;
      col.appendChild(bubble);
    }
    row.append(avatar, col);
    msgs.appendChild(row);
    msgs.scrollTop = msgs.scrollHeight;
    return bubble;
  }

  function renderMarkdown(text) {
    return text
      .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
      .replace(/```(\w*)\n?([\s\S]*?)```/g, (_, l, c) => `<pre><code>${c.trim()}</code></pre>`)
      .replace(/`([^`]+)`/g, "<code>$1</code>")
      .replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>")
      .replace(/\*(.+?)\*/g, "<em>$1</em>")
      .replace(/\n/g, "<br>");
   }
     
   // Strips the model's <think>…</think> reasoning, leaving only the answer.
   // Safe on a partial stream: hides an unclosed block and any half-arrived
   // tag so "<thi" never flashes on screen.
   function visibleAnswer(raw) {
     // remove completed <think>…</think> blocks
     let out = raw.replace(/<think>[\s\S]*?<\/think>/gi, "");
     // block still open (no </think> yet) → hide everything from it onward
     const open = out.indexOf("<think>");
     if (open !== -1) out = out.slice(0, open);
     // hold back a half-streamed tag like "<", "</thi", "<think"
     out = out.replace(/<\/?(?:t(?:h(?:i(?:n(?:k>?)?)?)?)?)?$/i, "");
     return out.replace(/^\s+/, "");
   }

  function clearChat() {
    history = [];
    sessionTokens = 0; promptWords = 0; responseWords = 0;
    document.getElementById("messages").innerHTML =
	  `<div class="empty-state" id="emptyState"><div>type a message to begin</div></div>`;
    updateTokens();
    updateWordCounts();
  }
  
  function finalizeAssistant(bubble, fullText) {
    if (bubble._dot) bubble._dot.style.background = "var(--green)";
    if (bubble._txt) bubble._txt.textContent = sessionTokens.toLocaleString() + " tokens (session)";
    history.push({ role: "assistant", content: fullText });
    responseWords += countWords(fullText);
    updateWordCounts();
    updateTokens();
  }

  function setTraffic(groupId, rowId, score, always=false) {
    const row = document.getElementById(rowId);
    if (!row) return;
    const lit = always || isStreaming;   // `always` keeps the light on permanently
    document.querySelectorAll(`#${groupId} .light`).forEach(l => {
    const level = parseInt(l.dataset.level, 10);
    if (lit && score != null && level === score) l.classList.add("on");
      else l.classList.remove("on");
      });
    if (lit) { row.classList.add("live"); row.classList.remove("dim"); }
    else     { row.classList.add("dim");  row.classList.remove("live"); }
  }
  function renderEfficiency() {
    // Eco-efficiency light stays on permanently (always=true)
    setTraffic("traffic-eco", "row-eff", EFFICIENCY_SCORE, true);
  }
  
  /*function renderEfficiency() {
      const rowEff = document.getElementById("row-eff");
      const lights = document.querySelectorAll("#traffic .light");
      lights.forEach(l => {
	  const level = parseInt(l.dataset.level, 10);
	  // light up only the selected score, and only while generating
	  if (isStreaming && level === EFFICIENCY_SCORE) {
	      l.classList.add("on");
	  } else {
	      l.classList.remove("on");
	  }
      });
      if (isStreaming) { rowEff.classList.add("live"); rowEff.classList.remove("dim"); }
      else             { rowEff.classList.add("dim");  rowEff.classList.remove("live"); }
  }*/

  // ---------------- Connect ----------------
  async function connect() {
    setStatus("connecting", "connecting…");
    const base = (document.getElementById("baseUrl").value || "") + "/v1";
    try {
      const r = await fetch(base + "/models");
      const data = await r.json();
      connectedModel = (data.data && data.data[0] && data.data[0].id) || "local-model";
      document.getElementById("modelId").value = connectedModel;
      setStatus("connected", "online");
      document.getElementById("sendBtn").disabled = !document.getElementById("input").value.trim();
      document.getElementById("input").focus();
    } catch (e) {
      setStatus("error", "connection failed");
      showToast("Cannot reach model server");
    }
  }

  // Send/Stream text
  async function sendMessage() {
    const input = document.getElementById("input");
    const text = input.value.trim();
    if (!text || isStreaming) return;
    if (!connectedModel) { showToast("Connect to a model first"); return; }

    input.value = ""; input.style.height = "auto";
    isStreaming = true;
    abortController = new AbortController();
    setStreamingUI(true);
    setActive(true);
    renderPower();

    if (DEBUG) console.log("%c[chat] user input:", "color:#22c55e", JSON.stringify(text));
    
    history.push({ role: "user", content: text });
    promptWords += countWords(text);
    updateWordCounts();
    appendMessage("user", text);
    const bubble = appendMessage("assistant", "");
    let fullText = "";

    // ---- smooth render via requestAnimationFrame batching ----
    const msgs = document.getElementById("messages");
    let pendingRender = false;
    function scheduleRender() {
      if (pendingRender) return;
      pendingRender = true;
      requestAnimationFrame(() => {
        bubble.innerHTML = renderMarkdown(fullText);
        // only auto-scroll if user is already near the bottom
        const nearBottom =
          msgs.scrollHeight - msgs.scrollTop - msgs.clientHeight < 120;
        if (nearBottom) msgs.scrollTop = msgs.scrollHeight;
        pendingRender = false;
      });
      }
    /*function scheduleRender() {
    if (pendingRender) return;
    pendingRender = true;
    requestAnimationFrame(() => { const visible = visibleAnswer(fullText);
    bubble.innerHTML = visible
    ? renderMarkdown(visible)
    : `<span style="color:var(--text3);font-family:var(--mono);font-size:12px">thinking…</span>`;
    const nearBottom = msgs.scrollHeight - msgs.scrollTop - msgs.clientHeight < 120;
    if (nearBottom) msgs.scrollTop = msgs.scrollHeight;
    pendingRender = false;
    });
    }*/

    const sys = document.getElementById("systemPrompt").value;
    const body = {
      model: connectedModel,
      messages: [{ role: "system", content: sys }, ...history],
      temperature: parseFloat(document.getElementById("temperature").value),
      max_tokens: parseInt(document.getElementById("maxTokens").value),
      stream: true,
      stream_options: { include_usage: true },
      chat_template_kwargs: { enable_thinking: false }   // ← disable Qwen thinking
    };

    if (DEBUG) console.log("[chat] request body:", JSON.stringify(body));

    try {
      const base = (document.getElementById("baseUrl").value || "") + "/v1";
      const resp = await fetch(base + "/chat/completions", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body),
        signal: abortController.signal
      });

      const reader = resp.body.getReader();
      const decoder = new TextDecoder();
      let buf = "";

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
	const chunkStr = decoder.decode(value, { stream: true });
	//if (DEBUG) console.log(`[chat] chunk (${value.byteLength}B):`, JSON.stringify(chunkStr));
        buf += chunkStr
        const lines = buf.split("\n");
        buf = lines.pop();
        for (const line of lines) {
        const l = line.trim();
	 //if (DEBUG) console.log(`[chat] `, l);
          if (!l.startsWith("data:")) continue;
          const payload = l.slice(5).trim();
          if (payload === "[DONE]") continue;
          let json;
          try { json = JSON.parse(payload); } catch { continue; }
	  //console.log(`[chat] `, JSON.stringify(json), `\n`)
	  
          const delta = json.choices && json.choices[0] && json.choices[0].delta
          ? json.choices[0].delta.content : "";
	  //if (DEBUG) console.log(`[chat] event content:`, JSON.stringify(delta))
	  
          if (delta) {
            fullText += delta;
            sessionTokens += approxTokens(delta);
            updateTokens();      // cheap text update, fine per token
	    updateWordCounts(fullText);   // <-- live response word count
            renderPower();       // cheap, fine per token
            scheduleRender();    // coalesced markdown render, max ~60fps
          }
          // reconcile to exact token count if server reports usage
          if (json.usage && typeof json.usage.completion_tokens === "number") {
            sessionTokens += (json.usage.completion_tokens - turnEstimate());
            updateTokens();
          }
        }
      }
      // flush one final render so the last tokens definitely show
      requestAnimationFrame(() => { bubble.innerHTML = renderMarkdown(fullText); });
      finalizeAssistant(bubble, fullText);
      //requestAnimationFrame(() => { bubble.innerHTML = renderMarkdown(visibleAnswer(fullText)); });
      //finalizeAssistant(bubble, visibleAnswer(fullText));
    } catch (e) {
      if (e.name === "AbortError") {
        if (!fullText) {
          bubble.innerHTML = `<span style="color:var(--text3);font-family:var(--mono);font-size:12px">(paused)</span>`;
        } else {
          //bubble.innerHTML = renderMarkdown(visibleAnswer(fullText));  // show what we have
          //finalizeAssistant(bubble, visibleAnswer(fullText));
	  bubble.innerHTML = renderMarkdown(fullText);  // show what we have
          finalizeAssistant(bubble, fullText);
        }
      } else {
        bubble.innerHTML = `<span style="color:#fca5a5;font-family:var(--mono);font-size:12px">error: ${e.message}</span>`;
        history.pop();
      }
    } finally {
      isStreaming = false;
      abortController = null;
      setStreamingUI(false);
      setActive(false);
      renderPower();
      document.getElementById("sendBtn").disabled = !input.value.trim();
      input.focus();
    }
  }

  // crude per-chunk token estimate for live ticking; reconciled from usage at end
  let _turnEstimate = 0;
  function approxTokens(s) {
    const t = Math.max(1, Math.round(s.length / 4));
    _turnEstimate += t;
    return t;
  }
  function turnEstimate() { const v = _turnEstimate; _turnEstimate = 0; return v; }

  // ---------------- Init ----------------
  window.addEventListener("load", () => {
    document.getElementById("sendBtn").innerHTML = SEND_ICON;
    document.getElementById("input").addEventListener("input", function () {
      if (isStreaming) return;
      document.getElementById("sendBtn").disabled = !this.value.trim();
    });
    updateWordCounts();  
    updateTokens();
    renderPower();
    pollPower();
    connect();
  });
</script>
